<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <title>{% block title %}{% endblock title %} | LuxEstate</title>
    <style>
      body {
        background-color: #f8f5f0;
        font-family: Georgia, serif;
      }
      .navbar-brand {
        font-size: 1.5rem;
        letter-spacing: 2px;
        font-weight: bold;
      }
      .hero-section {
        background-image: url("https://images.unsplash.com/photo-1600596542815-ffad4c1539a9?w=1400&q=80");
        background-size: cover;
        background-position: center;
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .hero-overlay {
        background-color: rgba(0, 0, 0, 0.55);
        width: 100%;
        padding: 80px 20px;
        text-align: center;
      }
      footer {
        background-color: #1a1a1a;
        color: #aaa;
        padding: 30px 0;
        text-align: center;
        margin-top: 60px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{{ url_for('home') }}">🏡 LuxEstate</a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('home') }}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('about') }}">About</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="{{ url_for('contact') }}">Contact</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <main>{% block content %} {% endblock content %}</main>

    <footer>
      <p class="mb-1">🏡 LuxEstate &copy; 2026 — All Rights Reserved</p>
      <p class="mb-0" style="font-size: 0.85rem">
        123 Luxury Ave, San Diego, CA 92101 | (555) 987-6543
      </p>
    </footer>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
